<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
    <h1>Patient Entry Dashboard</h1>

    <div style="display:flex; gap:10px; align-items:center;">

        <!-- THEME BUTTON -->
        <button class="theme-btn" onclick="toggleTheme()">
            🌙 / ☀️
        </button>

        <!-- LOGOUT -->
        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>
</header>

<div class="dashboard-container">

    <h2>Add New Patient</h2>

    <form class="patient-form" id="patientForm">

        <div class="form-group">
            <label>Patient ID</label>
            <input type="text" id="patientId" placeholder="Enter Patient ID">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Patient Name</label>
            <input type="text" id="patientName" placeholder="Enter Patient Name">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age" placeholder="Enter Age">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter Phone Number">
            <small class="error"></small>
        </div>

        <div class="form-group full-width">
            <label>Address</label>
            <textarea id="address" placeholder="Enter Address"></textarea>
            <small class="error"></small>
        </div>

        <div class="form-group full-width">
            <label>Notes</label>
            <textarea id="notes" placeholder="Enter Medical Notes"></textarea>
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Disease / Diagnosis</label>
            <input type="text" id="disease" placeholder="Enter Disease">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Doctor Name</label>
            <input type="text" id="doctor" placeholder="Enter Doctor Name">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label>Visit Date</label>
            <input type="date" id="admissionDate">
            <small class="error"></small>
        </div>
        <div class="btn-container">
            <button type="button" onclick="generatePDF()">
                Save Patient
            </button>
        </div>

    </form>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
