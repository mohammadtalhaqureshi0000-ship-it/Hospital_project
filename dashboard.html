
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Entry Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <h1>Patient Entry Dashboard</h1>

    <div class="header-buttons">

        <button type="button" class="theme-btn" onclick="toggleTheme()">
            🌙 / ☀️
        </button>

        <button type="button" class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>

</header>

<div class="dashboard-container">

    <h2>Add New Patient</h2>

    <form id="patientForm" class="patient-form">

        <div class="form-group">
            <label for="patientId">Patient ID</label>
            <input type="text" id="patientId" placeholder="Enter Patient ID">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="patientName">Patient Name</label>
            <input type="text" id="patientName" placeholder="Enter Patient Name">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Enter Age">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>

            <select id="gender">
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="Enter Phone Number">
            <small class="error"></small>
        </div>

        <div class="form-group full-width">
            <label for="address">Address</label>
            <textarea id="address" placeholder="Enter Address"></textarea>
            <small class="error"></small>
        </div>

        <div class="form-group full-width">
            <label for="notes">Medical Notes</label>
            <textarea id="notes" placeholder="Enter Medical Notes"></textarea>
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="disease">Disease / Diagnosis</label>
            <input type="text" id="disease" placeholder="Enter Disease">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="doctor">Doctor Name</label>
            <input type="text" id="doctor" placeholder="Enter Doctor Name">
            <small class="error"></small>
        </div>

        <div class="form-group">
            <label for="admissionDate">Visit Date</label>
            <input type="date" id="admissionDate">
            <small class="error"></small>
        </div>

        <div class="form-group full-width">
            <button type="button" onclick="generatePDF()">
                Save Patient
            </button>
        </div>

    </form>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
```
